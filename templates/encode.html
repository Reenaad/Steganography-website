{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>Cast Encoding Charm</h2>
    <p class="subtitle">Upload a portrait and type a magical message to conceal within it.</p>
    
    <form action="{{ url_for('encode') }}" method="POST" enctype="multipart/form-data">
        <div class="input-group file-upload">
            <label for="image">Cover Portrait (PNG/JPG)</label>
            <input type="file" id="image" name="image" accept=".png, .jpg, .jpeg" required>
            <div class="file-preview" id="file-preview-text">Drag and drop or click to invoke</div>
        </div>
        
        <div class="input-group">
            <label for="message">Secret Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Enter the secret message here..." required></textarea>
        </div>
        
        <div class="input-group">
            <label for="password">Encryption Charm</label>
            <input type="password" id="password" name="password" placeholder="Enter a secure spell" required>
        </div>
        
        <button type="submit" class="btn submit-btn">Conceal Secret Message</button>
    </form>
</div>
{% endblock %}
